<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }
        #app-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        #fullscreen-video, #youtube-player-iframe-fs iframe {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        #info-bar {
            position: absolute;
            top: -200px;
            left: 2rem;
            right: 2rem;
            padding: 1rem;
            background: rgba(0,0,0,0.7);
            border-radius: 0 0 10px 10px;
            transition: top 0.5s ease-in-out;
            z-index: 10;
        }
        #info-bar.visible {
            top: 0;
        }
        #info-bar h2 { margin: 0 0 0.5rem 0; }
        #info-bar p { margin: 0; max-height: 100px; overflow: auto; }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="fullscreen-player-container">
            <video id="fullscreen-video" playsinline autoplay></video>
            <div id="youtube-player-iframe-fs"></div>

            <div id="info-bar">
                <h2 id="info-title"></h2>
                <p id="info-desc"></p>
            </div>
        </div>
    </div>

    <div id="menu-overlay"></div>
    <nav id="side-menu">
        <h2>Menu</h2>
        <div id="widget-slideshow-container">
            <div id="hourly-forecast-widget" class="widget-slide">
                <div class="widget-title">HOURLY FORECAST</div>
                <div class="forecast-items"></div>
            </div>
            <div id="recommendation-widget" class="widget-slide">
                <div class="widget-title">COMING UP NEXT</div>
                <div class="rec-content"></div>
            </div>
        </div>
        <ul>
            <li><a href="index.html" class="menu-button">Guide</a></li>
            <li><a href="ondemand.html" class="menu-button">On-Demand</a></li>
        </ul>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="scripts/player.js"></script>
</body>
</html>
