<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>On-Demand</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .ondemand-container {
            padding: 2.5rem;
            text-align: center;
        }
        .ondemand-container h1 {
            color: var(--accent-color);
            font-size: 3em;
        }
        .ondemand-container p {
            font-size: 1.2em;
        }
        .back-link {
            display: inline-block;
            margin-top: 2.5rem;
            padding: 0.6rem 1.2rem;
            background-color: var(--secondary-bg);
            color: var(--text-color);
            text-decoration: none;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="ondemand-container">
        <h1>On-Demand</h1>
        <p>This page is under construction.</p>
        <a href="index.html" class="back-link">Back to Guide</a>
    </div>

    <script>
        async function applyTheme() {
            try {
                const response = await fetch('config.xml');
                if (!response.ok) return;
                const xmlString = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlString, "application/xml");
                
                const colorNodes = xmlDoc.querySelectorAll('colors *');
                colorNodes.forEach(node => {
                    const key = `--${node.tagName.toLowerCase()}`;
                    const value = node.textContent;
                    document.documentElement.style.setProperty(key.replace(/([a-z])([A-Z])/g, '$1-$2'), value);
                });
            } catch (err) {
                console.error("Could not load theme:", err);
            }
        }
        applyTheme();
    </script>
</body>
</html>
