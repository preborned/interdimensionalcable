<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iCable - On-Demand</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            overflow-y: auto;
        }
        
        #ondemand-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        #ondemand-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.5em;
            font-weight: 700;
            padding-bottom: 0.7rem;
            flex-shrink: 0;
        }
        
        #ondemand-logo-placeholder {
            width: 13rem;
            height: 3rem;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: left center;
        }
        
        #ondemand-details {
            display: grid;
            grid-template-columns: 8rem 1fr minmax(280px, 400px);
            gap: 1.5rem;
            padding: 1.5rem;
            background-image: linear-gradient(180deg, var(--secondary-bg) 0%, #1e2444 100%);
            border: 1px solid var(--tertiary-bg);
            border-radius: 0.75rem;
            margin-top: 1rem;
            flex-shrink: 0;
            align-items: start;
        }
        
        .details-meta {
            font-size: 0.9em;
            opacity: 0.8;
            margin-bottom: 0.5rem;
        }
        
        #ondemand-content {
            flex: 1;
            overflow-y: scroll;
            overflow-x: hidden;
            padding: 1rem 0;
            margin-top: 1rem;
        }
        
        #ondemand-content::-webkit-scrollbar {
            display: none;
        }
        
        .content-row {
            margin-bottom: 2.5rem;
            min-height: 350px;
        }
        
        .row-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding: 0 1rem;
        }
        
        .row-title {
            font-size: 1.3em;
            font-weight: bold;
            color: var(--accent-color);
        }
        
        .row-count {
            font-size: 0.9em;
            opacity: 0.6;
        }
        
        .poster-grid {
            display: flex;
            gap: 1rem;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 0 1rem 1rem;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        .poster-grid::-webkit-scrollbar {
            display: none;
        }
        
        .poster-grid {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        .poster-item {
            flex-shrink: 0;
            width: 180px;
            cursor: pointer;
            position: relative;
            transition: transform 0.3s ease;
        }
        
        .poster-item:focus {
            outline: 3px solid var(--accent-color);
            outline-offset: 2px;
            border-radius: 0.5rem;
        }
        
        .poster-item:hover {
            transform: scale(1.05);
            z-index: 10;
        }
        
        .poster-image {
            width: 100%;
            height: 270px;
            object-fit: cover;
            border-radius: 0.5rem;
            background: var(--secondary-bg);
        }
        
        .poster-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.95) 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
            border-radius: 0.5rem;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        
        .poster-item:hover .poster-overlay {
            opacity: 1;
        }
        
        .poster-title {
            font-weight: bold;
            font-size: 0.95em;
            margin-bottom: 0.25rem;
            color: white;
        }
        
        .poster-meta {
            font-size: 0.8em;
            opacity: 0.8;
            color: white;
            margin-bottom: 0.5rem;
        }
        
        .poster-rating {
            display: inline-block;
            background: var(--accent-color);
            color: black;
            padding: 0.15rem 0.4rem;
            border-radius: 0.25rem;
            font-size: 0.75em;
            font-weight: bold;
            margin-right: 0.5rem;
        }
        
        .poster-desc {
            font-size: 0.75em;
            line-height: 1.3;
            opacity: 0.9;
            color: white;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        #action-menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        #action-menu-overlay.visible {
            display: flex;
        }
        
        #action-menu {
            background: var(--secondary-bg);
            border: 2px solid var(--accent-color);
            border-radius: 0.75rem;
            padding: 2rem;
            max-width: 700px;
            width: 90%;
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 2rem;
        }
        
        #action-menu-poster {
            width: 200px;
            height: 300px;
            object-fit: cover;
            border-radius: 0.5rem;
        }
        
        .action-menu-info {
            display: flex;
            flex-direction: column;
        }
        
        .action-menu-title {
            font-size: 1.5em;
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 0.5rem;
        }
        
        .action-menu-meta {
            font-size: 0.9em;
            opacity: 0.8;
            margin-bottom: 1rem;
        }
        
        .action-menu-desc {
            font-size: 0.9em;
            line-height: 1.5;
            margin-bottom: 1.5rem;
            max-height: 100px;
            overflow-y: auto;
        }
        
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .action-btn {
            padding: 0.8rem 1.5rem;
            border: 2px solid var(--tertiary-bg);
            background: var(--primary-bg-end);
            color: var(--text-color);
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s ease;
            text-align: left;
        }
        
        .action-btn:hover, .action-btn:focus {
            background: var(--accent-color);
            color: black;
            border-color: var(--accent-color);
            outline: none;
            transform: translateX(5px);
        }
        
        .action-btn-primary {
            background: var(--accent-color);
            color: black;
            border-color: var(--accent-color);
        }
        
        .action-btn-primary:hover {
            transform: scale(1.05) translateX(5px);
        }
        
        .loading-indicator {
            text-align: center;
            padding: 3rem;
            font-size: 1.2em;
            color: var(--accent-color);
        }
        
        @media (max-width: 768px) {
            #ondemand-details {
                grid-template-columns: 1fr;
            }
            
            #action-menu {
                grid-template-columns: 1fr;
                padding: 1.5rem;
            }
            
            #action-menu-poster {
                width: 100%;
                max-width: 200px;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="ondemand-container" class="guide-wrapper">
            <header id="ondemand-header">
                <div class="header-left">
                    <div id="ondemand-logo-placeholder"></div>
                </div>
                <div class="header-right">
                    <span id="ondemand-weather">--°F</span>
                    <span id="ondemand-time">--:-- --</span>
                </div>
            </header>
            
            <div id="ondemand-details">
                <div class="details-poster-container">
                    <img id="detail-poster" src="https://placehold.co/400x600/0c1428/FFFFFF?text=On-Demand" alt="Poster">
                </div>
                <div class="details-text-content">
                    <h3 id="detail-title">On-Demand Library</h3>
                    <div class="details-meta" id="detail-meta">Select content to play</div>
                    <div class="description-container">
                        <p id="detail-desc">Browse your media library, continue watching where you left off, or discover free content from YouTube and Tubi.</p>
                    </div>
                </div>
                <div id="mini-player-container">
                    <div id="player-ui-wrapper">
                        <video id="mini-player-video" playsinline muted></video>
                        <div id="youtube-player-iframe"></div>
                        <div id="player-controls">
                            <div id="progress-bar-container">
                                <div id="progress-bar-filled"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="ondemand-content">
                <div class="loading-indicator">Loading content...</div>
            </div>
        </div>
    </div>
    
    <div id="action-menu-overlay">
        <div id="action-menu">
            <img id="action-menu-poster" src="" alt="Poster">
            <div class="action-menu-info">
                <div class="action-menu-title" id="action-menu-title">Title</div>
                <div class="action-menu-meta" id="action-menu-meta">2024 • Movie</div>
                <div class="action-menu-desc" id="action-menu-desc">Description</div>
                <div class="action-buttons">
                    <button class="action-btn action-btn-primary" id="action-play">▶ Play</button>
                    <button class="action-btn" id="action-restart" style="display: none;">↻ Restart</button>
                    <button class="action-btn" id="action-episodes" style="display: none;">📺 Episodes</button>
                    <button class="action-btn" id="action-close">✕ Close</button>
                </div>
            </div>
        </div>
    </div>
    
    <div id="menu-overlay"></div>
    <nav id="side-menu">
        <div id="widget-slideshow-container">
            <div id="hourly-forecast-widget" class="widget-slide">
                <div class="widget-title">HOURLY FORECAST</div>
                <div class="forecast-items"></div>
            </div>
            <div id="recommendation-widget" class="widget-slide">
                <div class="widget-title">COMING UP NEXT</div>
                <div class="rec-content"></div>
            </div>
            <div id="custom-message-widget" class="widget-slide">
                <div class="widget-title">MESSAGE</div>
                <div class="widget-content"></div>
            </div>
        </div>
        <h2>Menu</h2>
        <ul>
            <li><a href="index.html" class="menu-button">Guide</a></li>
            <li><a href="settings.html" class="menu-button">Settings</a></li>
        </ul>
    </nav>
    
    <audio id="error-sound" src="https://www.myinstants.com/media/sounds/windows-8-1-error-sound.mp3" preload="auto"></audio>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="scripts/config-manager.js"></script>
    <script src="scripts/ondemand.js"></script>
    <script src="scripts/menu-widgets.js"></script>
</body>
</html>
