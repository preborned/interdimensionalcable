<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>icable-development</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(1.05);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        @keyframes zoomOut {
            from {
                opacity: 1;
                transform: scale(1);
            }
            to {
                opacity: 0;
                transform: scale(0.95);
            }
        }
        
        #current-program-details {
            min-height: auto;
            display: grid;
            grid-template-columns: auto 1fr minmax(280px, 400px);
            gap: 1.5rem;
            align-items: start;
            padding: 1.5rem;
        }
        
        #mini-player-container {
            aspect-ratio: 16 / 9;
            width: 100%;
            height: auto;
            border-radius: 0.5rem;
            overflow: hidden;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            align-self: center;
        }
        
        #mini-player-video,
        #youtube-player-iframe iframe {
            width: 100%;
            height: 100%;
            object-fit: contain;
            cursor: pointer;
        }
        
        #player-ui-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        .widget-slide {
            border-radius: 0.5rem;
            overflow: hidden;
        }
    
        
        @media (max-width: 1200px) {
            #current-program-details {
                grid-template-columns: 1fr;
            }
            
            #mini-player-container {
                width: 100%;
                max-width: 600px;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="guide-wrapper">
            <header id="guide-header">
                <div class="header-left">
                     <div id="guide-logo-placeholder"></div>
                </div>
                <div class="header-right">
                    <span id="guide-weather">--°F</span>
                    <span id="guide-time">--:-- --</span>
                </div>
            </header>
    
            <div id="current-program-details">
                <div class="details-poster-container"></div>
                <div class="details-text-content">
                    <h3></h3>
                    <div class="details-channel-info"></div>
                    <div class="description-container">
                        <p></p>
                    </div>
                     <div class="details-timeslot"></div>
                </div>
                <div id="mini-player-container">
                    <div id="player-ui-wrapper">
                        <video id="mini-player-video" playsinline muted></video>
                        <div id="youtube-player-iframe"></div>
                        <div id="player-controls">
                             <div id="progress-bar-container">
                                <div id="progress-bar-filled"></div>
                            </div>
                            <button id="fullscreen-button" title="Go Fullscreen">[ ]</button>
                        </div>
                    </div>
                </div>
            </div>
    
            <div id="guide-body">
                <div id="guide-corner">Guide</div>
                <div id="time-bar"><div id="time-bar-content"></div></div>
                <div id="channel-list"></div>
                <div id="program-grid-container">
                    <div id="program-grid"></div>
                </div>
            </div>

            <div id="message-box">
                <p id="message-text"></p>
            </div>
        </div>
    </div>

    <div id="menu-overlay"></div>
    <nav id="side-menu">
        <div id="widget-slideshow-container">
            <div id="hourly-forecast-widget" class="widget-slide">
                <div class="widget-title">HOURLY FORECAST</div>
                <div class="forecast-items"></div>
            </div>
            <div id="recommendation-widget" class="widget-slide">
                <div class="widget-title">COMING UP NEXT</div>
                <div class="rec-content"></div>
            </div>
            <div id="custom-message-widget" class="widget-slide">
                <div class="widget-title">MESSAGE</div>
                <div class="widget-content"></div>
            </div>
        </div>
        <h2>Menu</h2>
        <ul>
            <li><a href="settings.html" class="menu-button">Settings</a></li>
            <li><a href="ondemand.html" class="menu-button">On-Demand</a></li>
        </ul>
    </nav>
    
    <audio id="error-sound" src="https://www.myinstants.com/media/sounds/windows-8-1-error-sound.mp3" preload="auto"></audio>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="scripts/config-manager.js"></script>
    <script src="scripts/main.js"></script>
    <script src="scripts/menu-widgets.js"></script>
</body>
</html>
